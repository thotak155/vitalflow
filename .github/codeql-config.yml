name: "VitalFlow CodeQL config"

paths:
  - apps
  - packages
  - services
  - supabase/functions

paths-ignore:
  - "**/dist/**"
  - "**/.next/**"
  - "**/node_modules/**"
  - "**/*.generated.ts"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"

queries:
  - uses: security-extended
  - uses: security-and-quality
